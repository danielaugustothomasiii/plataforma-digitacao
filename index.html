<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TypeRush — Teste de Digitação</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Righteous&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="blob-mid"></div>

  <header>
    <div class="logo">TYPE<span>RUSH</span></div>
    <nav class="modes">
      <button class="mode-btn active" data-mode="15">15s</button>
      <button class="mode-btn" data-mode="30">30s</button>
      <button class="mode-btn" data-mode="60">60s</button>
      <button class="mode-btn" data-mode="custom">∞</button>
    </nav>
    <div class="header-right">
      <button id="themeToggle" title="Alternar tema">◑</button>
    </div>
  </header>

  <main>
    <!-- Stats Bar -->
    <div class="stats-bar" id="statsBar">
      <div class="stat">
        <span class="stat-val" id="wpmDisplay">—</span>
        <span class="stat-label">WPM</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <span class="stat-val" id="accDisplay">—</span>
        <span class="stat-label">Precisão</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <span class="stat-val" id="timerDisplay">—</span>
        <span class="stat-label">Tempo</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <span class="stat-val" id="errDisplay">—</span>
        <span class="stat-label">Erros</span>
      </div>
    </div>

    <!-- Typing Area -->
    <div class="typing-wrapper">
      <div class="typing-box" id="typingBox">
        <div class="words-container" id="wordsContainer"></div>
      </div>
      <input
        type="text"
        id="typingInput"
        class="hidden-input"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
        aria-label="Campo de digitação"
      />
      <div class="click-hint" id="clickHint">Clique aqui ou pressione qualquer tecla para começar</div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <button id="restartBtn" class="btn-restart" title="Reiniciar (Tab)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
          <path d="M3 3v5h5"/>
        </svg>
        Reiniciar
      </button>
      <button id="newTextBtn" class="btn-secondary">Novo Texto</button>
    </div>
  </main>

  <!-- Results Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="resultsModal">
      <div class="modal-header">
        <span class="modal-badge">Resultado</span>
        <h2 id="resultRating">—</h2>
      </div>

      <div class="result-grid">
        <div class="result-card primary">
          <span class="result-num" id="finalWpm">0</span>
          <span class="result-desc">WPM</span>
        </div>
        <div class="result-card">
          <span class="result-num" id="finalAcc">0%</span>
          <span class="result-desc">Precisão</span>
        </div>
        <div class="result-card">
          <span class="result-num" id="finalTime">0s</span>
          <span class="result-desc">Tempo</span>
        </div>
        <div class="result-card">
          <span class="result-num" id="finalErrors">0</span>
          <span class="result-desc">Erros</span>
        </div>
        <div class="result-card">
          <span class="result-num" id="finalChars">0</span>
          <span class="result-desc">Caracteres</span>
        </div>
        <div class="result-card">
          <span class="result-num" id="finalWords">0</span>
          <span class="result-desc">Palavras</span>
        </div>
      </div>

      <!-- Chart -->
      <div class="chart-section">
        <p class="chart-label">WPM ao longo do tempo</p>
        <canvas id="wpmChart" width="500" height="120"></canvas>
      </div>

      <div class="modal-actions">
        <button class="btn-primary" id="modalRestart">Tentar Novamente</button>
        <button class="btn-outline" id="modalNew">Novo Texto</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
